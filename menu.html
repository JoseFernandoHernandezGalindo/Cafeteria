<!doctype html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Café Aroma - Menú</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-amber-50 text-stone-800">

  <!-- Barra de navegación -->
  <nav class="bg-stone-800 text-white px-6 py-4 flex justify-between items-center">
    <span class="text-xl font-bold">☕ Café Aroma</span>
    <div class="space-x-4">
      <a href="index.html" class="hover:text-amber-300">Inicio</a>
      <a href="menu.html" class="hover:text-amber-300">Menú</a>
      <a href="contacto.html" class="hover:text-amber-300">Contacto</a>
    </div>
  </nav>

  <!-- Título -->
  <header class="text-center py-12 px-6">
    <h1 class="text-3xl font-bold">Nuestro Menú</h1>
    <p class="text-stone-600 mt-2">Hecho con los mejores ingredientes</p>
  </header>

  <!-- Lista de productos -->
  <section class="max-w-3xl mx-auto px-6 pb-16 grid sm:grid-cols-2 gap-6">

    <div class="bg-white p-6 rounded-xl shadow flex justify-between items-center">
      <div>
        <h3 class="font-bold text-lg">Espresso</h3>
        <p class="text-stone-600 text-sm">Café puro e intenso.</p>
      </div>
      <span class="text-amber-700 font-bold">$35</span>
    </div>

    <div class="bg-white p-6 rounded-xl shadow flex justify-between items-center">
      <div>
        <h3 class="font-bold text-lg">Capuchino</h3>
        <p class="text-stone-600 text-sm">Espresso con leche espumada.</p>
      </div>
      <span class="text-amber-700 font-bold">$45</span>
    </div>

    <div class="bg-white p-6 rounded-xl shadow flex justify-between items-center">
      <div>
        <h3 class="font-bold text-lg">Latte</h3>
        <p class="text-stone-600 text-sm">Suave y cremoso.</p>
      </div>
      <span class="text-amber-700 font-bold">$50</span>
    </div>

    <div class="bg-white p-6 rounded-xl shadow flex justify-between items-center">
      <div>
        <h3 class="font-bold text-lg">Pastel de zanahoria</h3>
        <p class="text-stone-600 text-sm">Rebanada casera.</p>
      </div>
      <span class="text-amber-700 font-bold">$55</span>
    </div>

  </section>

  <!-- Pie de página -->
  <footer class="bg-stone-800 text-white text-center py-4">
    <p>© 2026 Café Aroma. Todos los derechos reservados.</p>
  </footer>

</body>
</html>
